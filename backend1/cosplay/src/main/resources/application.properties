spring.application.name=cosplay
# =========================================

# =========================================
# DATABASE - SQL SERVER
# =========================================
spring.datasource.url=jdbc:sqlserver://HOANG;databaseName=DATN;encrypt=false;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123456yeO
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true

# =========================================
# JWT CONFIGURATION
# =========================================
app.jwt.secret=cosplay-shop-super-secret-key-2024-change-this-in-production
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# =========================================
# FILE UPLOAD
# =========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=uploads/

# =========================================
# MAIL (cho quên mật khẩu)
# =========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =========================================
# SERVER
# =========================================
server.port=8084
server.servlet.context-path=/api

# =========================================
# CORS
# =========================================
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# =========================================
# SWAGGER
# =========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# =========================================
# LOGGING
# =========================================
logging.level.com.cosplay=DEBUG
logging.level.org.springframework.security=WARN
